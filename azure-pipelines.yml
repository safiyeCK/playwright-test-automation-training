trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: lts/*
    displayName: Use Node.js LTS

  - script: npm ci
    displayName: Install dependencies

  - script: npx playwright install --with-deps
    displayName: Install Playwright browsers

  - script: npx playwright test
    displayName: Run Playwright tests

  - script: |
      if [ ! -d "playwright-report" ]; then
        mkdir -p playwright-report
        echo "Playwright HTML report was not generated. Check the test step logs." > playwright-report/README.txt
      fi
      if [ ! -d "test-results" ]; then
        mkdir -p test-results
        echo "No test-results directory was generated." > test-results/README.txt
      fi
    condition: always()
    displayName: Ensure artifact folders exist

  - task: PublishPipelineArtifact@1
    condition: always()
    inputs:
      targetPath: playwright-report
      artifact: playwright-report
      publishLocation: pipeline
    displayName: Publish Playwright report

  - task: PublishPipelineArtifact@1
    condition: always()
    inputs:
      targetPath: test-results
      artifact: test-results
      publishLocation: pipeline
    displayName: Publish test results
